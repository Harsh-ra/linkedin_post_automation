<svg viewBox="0 0 980 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#bc8cff"/>
      <stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="comet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#79c0ff"/>
      <stop offset="1" stop-color="#79c0ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- card -->
  <rect x="1" y="1" width="978" height="358" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- title -->
  <text x="40" y="52" font-size="26" font-weight="700" fill="url(#title)">Daily Social Posts Pipeline</text>
  <text x="41" y="78" font-size="14" fill="#8b949e">Auto-runs every day at 11:00 AM  ·  publishes to LinkedIn on your Slack command</text>

  <!-- flowing base track -->
  <line x1="100" y1="190" x2="880" y2="190" stroke="#30363d" stroke-width="6" stroke-linecap="round"/>
  <line x1="100" y1="190" x2="880" y2="190" stroke="url(#flow)" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="1 14">
    <animate attributeName="stroke-dashoffset" from="0" to="-15" dur="0.5s" repeatCount="indefinite"/>
  </line>

  <!-- traveling comets -->
  <g filter="url(#glow)">
    <circle r="9" fill="url(#comet)">
      <animateMotion path="M100,190 L880,190" dur="6s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle r="9" fill="url(#comet)">
      <animateMotion path="M100,190 L880,190" dur="6s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle r="9" fill="url(#comet)">
      <animateMotion path="M100,190 L880,190" dur="6s" repeatCount="indefinite" begin="4s"/>
    </circle>
  </g>

  <!-- ===== NODES ===== -->

  <!-- 1 Research @100 -->
  <g>
    <circle cx="100" cy="190" r="26" fill="none" stroke="#58a6ff" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="190" r="24" fill="#161b22" stroke="#58a6ff" stroke-width="2.5"/>
    <text x="100" y="197" text-anchor="middle" font-size="16" font-weight="700" fill="#58a6ff">1</text>
    <text x="100" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Research</text>
    <text x="100" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">Reddit · X · AI news</text>
  </g>

  <!-- 2 Generate @256 -->
  <g>
    <circle cx="256" cy="190" r="26" fill="none" stroke="#bc8cff" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="190" r="24" fill="#161b22" stroke="#bc8cff" stroke-width="2.5"/>
    <text x="256" y="197" text-anchor="middle" font-size="16" font-weight="700" fill="#bc8cff">2</text>
    <text x="256" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Generate</text>
    <text x="256" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">AI writes the posts</text>
  </g>

  <!-- 3 Build @412 -->
  <g>
    <circle cx="412" cy="190" r="26" fill="none" stroke="#f778ba" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="412" cy="190" r="24" fill="#161b22" stroke="#f778ba" stroke-width="2.5"/>
    <text x="412" y="197" text-anchor="middle" font-size="16" font-weight="700" fill="#f778ba">3</text>
    <text x="412" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Build</text>
    <text x="412" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">carousel · infographic</text>
  </g>

  <!-- 4 Slack @568 -->
  <g>
    <circle cx="568" cy="190" r="26" fill="none" stroke="#d29922" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="3.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="568" cy="190" r="24" fill="#161b22" stroke="#d29922" stroke-width="2.5"/>
    <text x="568" y="197" text-anchor="middle" font-size="16" font-weight="700" fill="#d29922">4</text>
    <text x="568" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Deliver</text>
    <text x="568" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">drop into Slack</text>
  </g>

  <!-- 5 Schedule @724 (manual trigger) -->
  <g>
    <circle cx="724" cy="190" r="26" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="4.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="4.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="724" cy="190" r="24" fill="#161b22" stroke="#3fb950" stroke-width="2.5"/>
    <text x="724" y="197" text-anchor="middle" font-size="16" font-weight="700" fill="#3fb950">5</text>
    <text x="724" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Schedule</text>
    <text x="724" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">you type &#8220;schedule&#8221;</text>
  </g>

  <!-- 6 Live @880 -->
  <g>
    <circle cx="880" cy="190" r="26" fill="none" stroke="#2ea043" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="26;33;26" dur="6s" begin="5.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0;0.9" dur="6s" begin="5.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="880" cy="190" r="24" fill="#161b22" stroke="#2ea043" stroke-width="2.5"/>
    <path d="M871,190 l6,6 l12,-13" fill="none" stroke="#2ea043" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="880" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#c9d1d9">Live</text>
    <text x="880" y="257" text-anchor="middle" font-size="10.5" fill="#8b949e">posted to LinkedIn</text>
  </g>

  <!-- trigger badges -->
  <g>
    <rect x="40" y="298" width="160" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <circle cx="60" cy="313" r="4" fill="#58a6ff"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <text x="72" y="317" font-size="11.5" fill="#8b949e">11:00 AM · automatic</text>

    <rect x="212" y="298" width="205" height="30" rx="15" fill="#161b22" stroke="#30363d"/>
    <circle cx="232" cy="313" r="4" fill="#3fb950"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.8s" repeatCount="indefinite"/></circle>
    <text x="244" y="317" font-size="11.5" fill="#8b949e">Slack &#8220;schedule&#8221; · your go-ahead</text>
  </g>
</svg>
